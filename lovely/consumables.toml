# Death
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
for i=1, #G.hand.highlighted do if G.hand.highlighted[i].T.x > rightmost.T.x then rightmost = G.hand.highlighted[i] end end
'''
position = 'after'
match_indent = true
payload = '''
G.E_MANAGER:add_event(Event({
    func = function()
        if G.GAME.blind.config.blind.key ~= nil then
            local playlog_copied_to = {}
            for i=1, #G.hand.highlighted do if G.hand.highlighted[i] ~= rightmost then table.insert(playlog_copied_to, G.hand.highlighted[i]) end end
            GameState.remove_playing_cards(playlog_copied_to)
            GameState.add_playing_cards({rightmost})
            GameState.print_playing_cards()
            return true
        end
    end
}))
'''

# Familiar, Grim, Incantation
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
destroyed_cards[#destroyed_cards + 1] = pseudorandom_element(G.hand.cards, pseudoseed('random_destroy'))
'''
position = 'after'
match_indent = true
payload = '''
G.E_MANAGER:add_event(Event({
    func = function()
        if G.GAME.blind.config.blind.key ~= nil then
            GameState.remove_playing_cards(destroyed_cards)
            return true
        end
    end
}))
'''

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
